[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tenxyte"
version = "0.9.1.7"
description = "Complete Django authentication package — JWT, RBAC, 2FA (TOTP), Magic Links, Passkeys (WebAuthn), Social Login, Breach Check, Organizations B2B, and multi-application support"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    { name = "Tenxyte Team", email = "contact@tenxyte.com" }
]
keywords = [
    "django",
    "authentication",
    "jwt",
    "2fa",
    "totp",
    "rbac",
    "otp",
    "google-authenticator",
    "role-based-access-control",
    "organizations",
    "multi-tenant",
    "b2b",
    "device-fingerprinting",
    "audit-log",
    "gdpr",
    "magic-link",
    "passkeys",
    "webauthn",
    "fido2",
    "social-login",
    "oauth2",
    "breach-check",
    "haveibeenpwned"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: Django",
    "Framework :: Django :: 5.0",
    "Framework :: Django :: 5.1",
    "Framework :: Django :: 5.2",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "django>=5.0",
    "djangorestframework>=3.14",
    "django-cors-headers>=4.0",
    "drf-spectacular>=0.27",
    "PyJWT>=2.8",
    "bcrypt>=4.0",
    "pyotp>=2.9",
    "qrcode[pil]>=8.0",
    "google-auth>=2.20",
    "google-auth-oauthlib>=1.0",
    "django-cryptography>=1.1",  # R2 — chiffrement totp_secret
    "Pillow>=10.0.1",           # R3 — CVE-2023-44271, CVE-2022-45199, CVE-2021-25289
    "requests>=2.31.0",         # R7 — CVE-2023-32681
]

[project.optional-dependencies]
# Support SMS via Twilio
twilio = [
    "twilio>=9.0",
]

# Support email via SendGrid
sendgrid = [
    "sendgrid>=6.10",
]

# Bases de données
mongodb = [
    "django-mongodb-backend>=5.0",
]

postgres = [
    "psycopg2-binary>=2.9",
]

mysql = [
    "mysqlclient>=2.2",
]

# R4 — WebAuthn/FIDO2 (optionnel, contrainte de version explicite)
webauthn = [
    "py_webauthn==2.0.0",
]

# Tout inclure
all = [
    "twilio>=9.0",
    "sendgrid>=6.10",
    "django-mongodb-backend>=5.0",
    "psycopg2-binary>=2.9",
    "mysqlclient>=2.2",
    "py_webauthn==2.0.0",
]

# Dépendances de développement
dev = [
    "pytest>=7.0",
    "pytest-django>=4.5",
    "pytest-cov>=4.0",
    "pytest-asyncio>=0.21",
    "black>=23.0",
    "ruff>=0.1",
    "mypy>=1.0",
]

[project.urls]
Homepage = "https://github.com/tenxyte/tenxyte"
Documentation = "https://tenxyte.readthedocs.io"
Repository = "https://github.com/tenxyte/tenxyte"
Issues = "https://github.com/tenxyte/tenxyte/issues"
Changelog = "https://github.com/tenxyte/tenxyte/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/tenxyte"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "tests.settings"
pythonpath = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=tenxyte --cov-report=html --cov-report=term --cov-fail-under=90 --reuse-db --create-db"  # R13 — seuil aligné sur la réalité (98% actuel)

[tool.black]
line-length = 120
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 120
target-version = "py310"
