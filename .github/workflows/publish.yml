name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  test-core:
    name: Run core tests before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[core,dev]"

      - name: Run core tests
        run: pytest tests/core/ -p no:django --no-cov -q

  test-django:
    name: Run Django integration tests before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Django tests
        run: pytest tests/integration/django/ --no-cov -q

  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: [test-core, test-django]
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install hatch build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
