site_name: Tenxyte Documentation
site_url: https://tenxyte.readthedocs.io/en/latest/
repo_url: https://github.com/tenxyte/tenxyte
repo_name: tenxyte/tenxyte
docs_dir: docs/en

theme:
  name: material
  logo: https://tenxyte-graphics.s3.us-east-1.amazonaws.com/tenxyte-graphics/out/custom/SVG/v1_logo-sharp.svg
  favicon: https://tenxyte-graphics.s3.us-east-1.amazonaws.com/tenxyte-graphics/out/custom/SVG/v1_logo-sharp.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

extra:
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: Français
      link: /fr/
      lang: fr
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tenxyte/tenxyte

plugins:
  - search:
      lang: en
      
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - 'Getting Started':
      - 'Quickstart': quickstart.md
      - 'FastAPI Quickstart': fastapi_quickstart.md
      - 'Settings Reference': settings.md
  - 'Architecture':
      - 'Architecture Guide': architecture.md
      - 'Custom Adapters': custom_adapters.md
      - 'Async Guide': async_guide.md
  - 'API Reference':
      - 'API Endpoints': endpoints.md
      - 'Data Schemas': schemas.md
      - 'AIRs Reference': airs.md
  - 'Features':
      - 'Admin Accounts': admin.md
      - 'Applications Guide': applications.md
      - 'Organizations': organizations.md
      - 'RBAC Guide': rbac.md
      - 'Security Guide': security.md
      - 'Task Service': task_service.md
  - 'Operations & Maintenance':
      - 'Periodic Tasks': periodic_tasks.md
      - 'Troubleshooting': troubleshooting.md
      - 'Migration Guide': MIGRATION_GUIDE.md
      - 'Runbooks':
          - 'Deployment': runbooks/deployment.md
          - 'Incident Response': runbooks/incident_response.md
          - 'Rollback': runbooks/rollback.md
  - 'Contributing':
      - 'Contributing Guidelines': CONTRIBUTING.md
      - 'Testing': TESTING.md
