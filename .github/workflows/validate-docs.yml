name: Validate Documentation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**/*.md'
      - 'src/tenxyte/core/schemas.py'
      - 'src/tenxyte/serializers/**/*.py'
      - 'scripts/validate_*.py'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docs/**/*.md'
      - 'src/tenxyte/core/schemas.py'
      - 'src/tenxyte/serializers/**/*.py'
      - 'scripts/validate_*.py'

jobs:
  validate-canonical-spec:
    name: Validate Canonical Specification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic django djangorestframework
      
      - name: Validate canonical spec (Pydantic/DRF alignment)
        run: |
          python scripts/validate_canonical_spec.py
        continue-on-error: false
      
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-spec-validation-report
          path: CANONICAL_SPEC_VALIDATION_REPORT.md
          retention-days: 30

  validate-endpoints:
    name: Validate Endpoints Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic
      
      - name: Validate endpoints.md (EN)
        run: |
          python scripts/validate_endpoints.py --file docs/en/endpoints.md
        continue-on-error: false
      
      - name: Validate endpoints.md (FR)
        run: |
          python scripts/validate_endpoints.py --file docs/fr/endpoints.md
        continue-on-error: true  # Warnings only for French version
      
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: endpoints-validation-report
          path: ENDPOINTS_VALIDATION_REPORT.md
          retention-days: 30

  check-schema-consistency:
    name: Check Schema Consistency
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for missing schemas in docs
        run: |
          echo "Checking for undocumented schemas..."
          
          # Extract schema names from Pydantic
          PYDANTIC_SCHEMAS=$(grep -r "class.*Response.*BaseSchema\|TimestampMixin" src/tenxyte/core/schemas.py | grep -v "^#" | sed 's/class \([A-Za-z]*\).*/\1/' | sort)
          
          # Check if they're documented in schemas.md
          for schema in $PYDANTIC_SCHEMAS; do
            if ! grep -q "## $schema" docs/en/schemas.md; then
              echo "⚠️  Schema '$schema' not documented in schemas.md"
            fi
          done
          
          echo "✓ Schema consistency check complete"

  markdown-lint:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: |
            docs/**/*.md
            *.md
          config: .markdownlint.json
        continue-on-error: true  # Don't fail on markdown lint errors

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-canonical-spec, validate-endpoints, check-schema-consistency]
    if: always()
    
    steps:
      - name: Check validation results
        run: |
          echo "## Documentation Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.validate-canonical-spec.result }}" == "success" ]; then
            echo "✅ Canonical Specification: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Canonical Specification: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.validate-endpoints.result }}" == "success" ]; then
            echo "✅ Endpoints Documentation: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Endpoints Documentation: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.check-schema-consistency.result }}" == "success" ]; then
            echo "✅ Schema Consistency: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  Schema Consistency: WARNINGS" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See artifacts for detailed reports." >> $GITHUB_STEP_SUMMARY
