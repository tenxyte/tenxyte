name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ===========================================================================
  # Core tests — pure Python, no Django dependency
  # ===========================================================================
  core-tests:
    name: Core Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-core-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-core-${{ matrix.python-version }}-

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[core,dev]"

      - name: Run core tests
        run: |
          pytest tests/core/ -p no:django --no-cov -q

      - name: Run core tests with coverage (Python 3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          pytest tests/core/ -p no:django --cov=tenxyte.core --cov-report=xml:coverage-core.xml --cov-report=term -q

      - name: Upload core coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core
          path: coverage-core.xml

  # ===========================================================================
  # Django integration tests — requires Django ORM
  # ===========================================================================
  django-tests:
    name: Django Tests (Python ${{ matrix.python-version }}, Django ${{ matrix.django-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        django-version: ["4.2", "5.0", "5.1", "5.2", "6.0"]
        exclude:
          # Django 4.2 does not support Python 3.13
          - python-version: "3.13"
            django-version: "4.2"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-django-${{ matrix.python-version }}-${{ matrix.django-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-django-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "django==${{ matrix.django-version }}.*"
          pip install -e ".[dev]"

      - name: Run Django integration tests
        run: |
          pytest tests/integration/django/ --no-cov -q

      - name: Run tests with coverage (Python 3.12, Django 6.0 only)
        if: matrix.python-version == '3.12' && matrix.django-version == '6.0'
        run: |
          pytest tests/integration/django/ --cov=tenxyte --cov-report=xml:coverage-django.xml --cov-report=term -q

      - name: Upload Django coverage
        if: matrix.python-version == '3.12' && matrix.django-version == '6.0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-django
          path: coverage-django.xml

  # ===========================================================================
  # Upload combined coverage to Codecov
  # ===========================================================================
  coverage:
    name: Upload Coverage
    runs-on: ubuntu-latest
    needs: [core-tests, django-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download core coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-core
          path: coverage/
        continue-on-error: true

      - name: Download Django coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-django
          path: coverage/
        continue-on-error: true

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: coverage/
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # Lint
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Run ruff
        run: ruff check src/tenxyte/

      - name: Check black formatting
        run: black --check src/tenxyte/
