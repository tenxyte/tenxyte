name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "requirements*.txt"
  schedule:
    # Every Monday at 08:00 UTC (SCA weekly scan)
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  # ===========================================================================
  # SCA — Software Composition Analysis (R3, R7, R12)
  # Detects vulnerable dependencies
  # ===========================================================================
  sca:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[all]" pip-audit safety

      - name: pip-audit (CVE database check)
        run: pip-audit --desc on --format markdown

      - name: safety scan (known vulnerabilities)
        run: safety scan --full-report
        continue-on-error: true  # Non-bloquant en PR, bloquant en main via branch protection

  # ===========================================================================
  # SAST — Static Application Security Testing
  # Scans core + adapters + Django views
  # ===========================================================================
  sast:
    name: Static Security Analysis (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: >
          semgrep ci
          --config "p/python"
          --config "p/django"
          --config "p/security-audit"
          --config "p/secrets"
          --config "p/jwt"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ===========================================================================
  # Secrets detection
  # ===========================================================================
  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for gitleaks

      - name: gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
